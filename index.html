<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UE4Tools</title>
    <style>
        /* 基础样式重置与全局配置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(180deg, #f5f5f7 0%, #e8e8ed 100%);
            color: #1d1d1f;
            min-height: 100vh;
            padding: env(safe-area-inset-top, 20px) env(safe-area-inset-right, 20px) env(safe-area-inset-bottom, 20px) env(safe-area-inset-left, 20px);
            line-height: 1.5;
        }

        /* 标题样式 */
        h1 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 600;
            color: #1d1d1f;
            letter-spacing: -0.5px;
        }

        /*  - 主按钮 */
        button {
            width: 100%;
            padding: 14px 20px;
            font-size: 17px;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: #007aff;
            color: white;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.15);
        }

        button:hover {
            background-color: #0066cc;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
        }

        button:active {
            background-color: #0059b3;
            transform: scale(0.98);
        }

        /* 功能选择器 - 毛玻璃效果 */
        #functionSelector {
            display: none;
            max-width: 600px;
            margin: 0 auto 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* 功能区块样式 */
        section {
            display: none;
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* 输入组样式 */
       .input-group {
            margin-bottom: 24px;
        }

        /* 文本域样式 */
        textarea {
            width: 100%;
            padding: 16px;
            font-size: 17px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #1d1d1f;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.2s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #007aff;
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }

        textarea::placeholder {
            color: #86868b;
        }

        /* 文件输入样式美化 */
        input[type="file"] {
            width: 100%;
            padding: 14px;
            font-size: 17px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #1d1d1f;
            cursor: pointer;
            margin-bottom: 12px;
        }

        /* 提示信息样式 */
       .error-message {
            color: #ff3b30;
            font-size: 14px;
            margin: 12px 0;
            text-align: center;
        }

       .info-message {
            color: #ff9500;
            font-size: 14px;
            margin: 12px 0;
            text-align: center;
        }

        /* 结果区域样式 */
       .results {
            margin-top: 24px;
        }

       .result-item {
            margin-bottom: 24px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

       .result-item p {
            margin-bottom: 12px;
            font-weight: 500;
            color: #1d1d1f;
        }

        img {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        /* 差异对比预览区域 */
        #fileDiffSection.preview {
            margin-top: 24px;
            border: 1px solid #e0e0e0;
            padding: 16px;
            min-height: 140px;
            overflow-y: scroll;
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #1d1d1f;
            font-family: monospace;
            font-size: 14px;
        }

        /* 滚动条美化  */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.2);
        }

        /* 辅助按钮样式（清空、复制等） */
        #clearInputButton, #clearSubwayInputButton {
            background-color: #f5f5f7;
            color: #1d1d1f;
        }

        #clearInputButton:hover, #clearSubwayInputButton:hover {
            background-color: #e8e8ed;
        }

        /* 返回选择按钮样式 */
        #backToSelectBtn {
            max-width: 600px;
            margin: 0 auto 20px;
            display: none;
        }

        /* 响应式适配 */
        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            section, #functionSelector {
                padding: 20px;
            }

            h1 {
                font-size: 20px;
            }

            button {
                padding: 12px 16px;
                font-size: 16px;
            }

            /* 移动端调整滚动控制按钮大小 */
           .scroll-control-btn {
                width: 50px!important;
                height: 50px!important;
                font-size: 18px!important;
                bottom: 20px!important;
                right: 20px!important;
            }
        }

        /* 滚动控制按钮基础样式 - iOS 18风格 */
       .scroll-control-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: rgba(0, 122, 255, 0.9);
            color: white;
            border: none;
            font-size: 22px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
            transition: all 0.3s ease;
            z-index: 9999; /* 确保在最上层，但不遮挡内容 */
            opacity: 0; /* 初始隐藏 */
            pointer-events: none; /* 初始不可点击 */
        }

       .scroll-control-btn:hover {
            background-color: rgba(0, 98, 204, 0.9);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 122, 255, 0.4);
        }

       .scroll-control-btn:active {
            transform: translateY(-1px);
        }

       .scroll-control-btn.show {
            opacity: 1; /* 显示 */
            pointer-events: auto; /* 可点击 */
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/diff-match-patch/1.0.0/diff_match_patch.js"></script>
</head>
<body>
    <!-- 初始页面：标题 + 选择功能按钮 -->
    <div id="initialView">
        <h1 id="title">选择功能</h1>
        <button id="selectFunctionButton">选择功能</button>
    </div>

    <!-- 功能选择面板 -->
    <div id="functionSelector">
        <button id="iconSearchOption">批量icon检索</button>
        <button id="dumpProcessingOption">Dump内容修正处理</button>
        <button id="fileDiffOption">文件差异对比</button>
        <button id="subwayIconOption">地铁道具icon获取</button>
    </div>

    <!-- 返回选择按钮（在功能页面显示） -->
    <button id="backToSelectBtn">返回功能选择</button>

    <!-- 各功能页面 -->
    <section id="icon-search">
        <h1>批量icon检索</h1>
        <div class="input-group">
            <textarea id="content-input" placeholder="请输入多个数字组合，用逗号、换行或空格分隔"></textarea>
            <button id="clearInputButton">清空输入框</button>
        </div>
        <button id="process-button">开始检索</button>
        <div class="error-message" id="error-message"></div>
        <div class="info-message" id="info-message"></div>
        <div class="results" id="results"></div>
        <button id="downloadIconButton" style="display: none;" onclick="downloadIcons()">一键下载所有图标</button>
    </section>
    <section id="dump-processing">
        <h1>Dump内容修正处理</h1>
        <div class="input-group">
            <input type="file" id="fileInput" accept=".txt">
        </div>
        <button id="processDumpButton">处理文件</button>
        <div class="input-group">
            <h3>原始内容</h3>
            <textarea id="originalText" readonly></textarea>
        </div>
        <div class="input-group">
            <h3>处理后的内容</h3>
            <textarea id="processedText" readonly></textarea>
        </div>
        <button id="downloadDumpButton" style="display: none;">下载文件</button>
        <button id="copyDumpButton" style="display: none;">一键复制</button>
    </section>
    <section id="fileDiffSection">
        <h1>文件差异对比</h1>
        <div class="input-group">
            <input type="file" id="fileAInput" accept=".txt">
            <input type="file" id="fileBInput" accept=".txt">
        </div>
        <button id="compareFilesButton">对比文件</button>
        <div class="preview" id="diffPreview"></div>
        <button id="downloadDiffButton" style="display: none;">下载差异内容</button>
        <button id="copyDiffButton" style="display: none;">复制差异内容</button>
    </section>
    <section id="subway-icon">
        <h1>地铁道具icon获取</h1>
        <div class="input-group">
            <textarea id="subway-content-input" placeholder="请输入多个数字组合，用逗号、换行或空格分隔"></textarea>
            <button id="clearSubwayInputButton">清空输入框</button>
        </div>
        <button id="process-subway-button">开始获取</button>
        <div class="error-message" id="subway-error-message"></div>
        <div class="info-message" id="subway-info-message"></div>
        <div class="results" id="subway-results"></div>
        <button id="downloadSubwayIconButton" style="display: none;" onclick="downloadSubwayIcons()">一键下载所有图标</button>
    </section>

    <!-- 滚动控制按钮：置顶和置底 -->
    <button class="scroll-control-btn" id="backToTopBtn">↑</button>
    <button class="scroll-control-btn" id="backToBottomBtn">↓</button>

    <script>
        // DOM元素获取
        const initialView = document.getElementById('initialView');
        const selectFunctionButton = document.getElementById('selectFunctionButton');
        const functionSelector = document.getElementById('functionSelector');
        const backToSelectBtn = document.getElementById('backToSelectBtn');
        
        // 功能选项
        const iconSearchOption = document.getElementById('iconSearchOption');
        const dumpProcessingOption = document.getElementById('dumpProcessingOption');
        const fileDiffOption = document.getElementById('fileDiffOption');
        const subwayIconOption = document.getElementById('subwayIconOption');
        
        // 功能页面
        const iconSearchSection = document.getElementById('icon-search');
        const dumpProcessingSection = document.getElementById('dump-processing');
        const fileDiffSection = document.getElementById('fileDiffSection');
        const subwayIconSection = document.getElementById('subway-icon');
        
        // 所有功能页面集合
        const allFunctionSections = [
            iconSearchSection,
            dumpProcessingSection,
            fileDiffSection,
            subwayIconSection
        ];
        
        // 滚动控制按钮
        const backToTopBtn = document.getElementById('backToTopBtn');
        const backToBottomBtn = document.getElementById('backToBottomBtn');
        
        // 标记是否有内容生成（控制置底按钮显示）
        let hasContentGenerated = false;

        // ========== 核心交互逻辑 ==========
        // 1. 初始页面：点击选择功能 → 隐藏初始页面，显示功能选择面板
        selectFunctionButton.addEventListener('click', () => {
            initialView.style.display = 'none';
            functionSelector.style.display = 'block';
            hideAllFunctionSections();
            backToSelectBtn.style.display = 'none';
            hideBothScrollButtons();
            hasContentGenerated = false;
        });

        // 2. 返回功能选择：隐藏当前功能页面，显示功能选择面板
        backToSelectBtn.addEventListener('click', () => {
            hideAllFunctionSections();
            functionSelector.style.display = 'block';
            backToSelectBtn.style.display = 'none';
            hideBothScrollButtons();
            hasContentGenerated = false;
        });

        // 3. 选择具体功能 → 隐藏选择面板，显示对应功能页面，显示返回按钮
        iconSearchOption.addEventListener('click', () => {
            switchToFunctionPage(iconSearchSection);
        });
        
        dumpProcessingOption.addEventListener('click', () => {
            switchToFunctionPage(dumpProcessingSection);
        });
        
        fileDiffOption.addEventListener('click', () => {
            switchToFunctionPage(fileDiffSection);
        });
        
        subwayIconOption.addEventListener('click', () => {
            switchToFunctionPage(subwayIconSection);
        });

        // ========== 辅助函数 ==========
        /**
         * 隐藏所有功能页面
         */
        function hideAllFunctionSections() {
            allFunctionSections.forEach(section => {
                section.style.display = 'none';
            });
        }

        /**
         * 切换到指定功能页面
         * @param {HTMLElement} targetSection - 目标功能页面
         */
        function switchToFunctionPage(targetSection) {
            // 隐藏功能选择面板
            functionSelector.style.display = 'none';
            // 隐藏所有功能页面
            hideAllFunctionSections();
            // 显示目标功能页面
            targetSection.style.display = 'block';
            // 显示返回按钮
            backToSelectBtn.style.display = 'block';
            // 重置滚动按钮状态
            hideBothScrollButtons();
            hasContentGenerated = false;
        }

        // ========== 滚动控制逻辑 ==========
        // 隐藏两个按钮
        function hideBothScrollButtons() {
            backToTopBtn.classList.remove('show');
            backToBottomBtn.classList.remove('show');
        }
        
        // 显示置底按钮，隐藏置顶按钮
        function showBackToBottomButton() {
            backToBottomBtn.classList.add('show');
            backToTopBtn.classList.remove('show');
        }
        
        // 显示置顶按钮，隐藏置底按钮
        function showBackToTopButton() {
            backToTopBtn.classList.add('show');
            backToBottomBtn.classList.remove('show');
        }
        
        // 监听滚动事件，控制按钮显示/隐藏
        window.addEventListener('scroll', () => {
            if (!hasContentGenerated) return; // 没有内容时不显示任何滚动按钮
            
            // 滚动到底部时显示置顶按钮
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 10) {
                showBackToTopButton();
            } 
            // 滚动到顶部时显示置底按钮
            else if (window.scrollY <= 10) {
                showBackToBottomButton();
            }
            // 中间位置：保持当前显示的按钮（置底/置顶）
        });
        
        // 点击置顶按钮回到顶部（平滑滚动）
        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
            setTimeout(showBackToBottomButton, 500);
        });
        
        // 点击置底按钮到底部（平滑滚动）
        backToBottomBtn.addEventListener('click', () => {
            window.scrollTo({
                top: document.body.scrollHeight,
                behavior: 'smooth'
            });
            setTimeout(showBackToTopButton, 500);
        });

        // ========== 原有功能逻辑（完整保留，仅添加内容生成标记） ==========
        // 批量icon 检索
        const processButton = document.getElementById('process-button');
        const contentInput = document.getElementById('content-input');
        const errorMessage = document.getElementById('error-message');
        const infoMessage = document.getElementById('info-message');
        const results = document.getElementById('results');
        const downloadIconButton = document.getElementById('downloadIconButton');
        const clearInputButton = document.getElementById('clearInputButton');

        clearInputButton.addEventListener('click', () => {
            contentInput.value = '';
        });
        processButton.addEventListener('click', () => {
            errorMessage.textContent = '';
            infoMessage.textContent = '';
            results.innerHTML = '';
            const inputText = contentInput.value.trim();
            if (!inputText) {
                errorMessage.textContent = '请输入内容！';
                return;
            }
            const lines = inputText.split(/\r?\n/).filter(line => line.trim()!== '');
            const validEntries = [];
            
            lines.forEach(line => {
                const nameMatch = line.match(/^(\d+)\s*--\s*\d+\s*--\s*(.+)$/);
                const numberMatch = line.match(/\d+/);
                
                if (nameMatch) {
                    const name = nameMatch[2].trim();
                    const number = nameMatch[1].trim();
                    validEntries.push({ name, number });
                } else if (numberMatch) {
                    const number = numberMatch[0].trim();
                    validEntries.push({ name: "Null", number });
                }
            });
            
            if (validEntries.length === 0) {
                errorMessage.textContent = '输入内容无有效条目！';
                return;
            }
            
            validEntries.forEach(entry => {
                const imageUrl = `https://imgcdn.gp.qq.com/images/itemicon/v15/${entry.number}.png`;
                const resultItem = document.createElement('div');
                resultItem.className ='result-item';
                const title = document.createElement('p');
                title.textContent = `${entry.name} 输出值: ${entry.number}`;
                resultItem.appendChild(title);
                const img = document.createElement('img');
                img.src = imageUrl;
                img.alt = `${entry.name} ${entry.number}`;
                resultItem.appendChild(img);
                results.appendChild(resultItem);
            });
            
            infoMessage.textContent = `共处理了 ${validEntries.length} 个输入值。`;
            downloadIconButton.style.display = 'block';
            
            // 标记有内容生成
            hasContentGenerated = true;
            showBackToBottomButton();
        });
        
        function downloadIcons() {
            const imgs = document.querySelectorAll('#results img');
            imgs.forEach(img => {
                const a = document.createElement('a');
                a.href = img.src;
                a.download = img.src.split('/').pop();
                a.click();
            });
        }

        // 地铁道具icon获取功能
        const processSubwayButton = document.getElementById('process-subway-button');
        const subwayContentInput = document.getElementById('subway-content-input');
        const subwayErrorMessage = document.getElementById('subway-error-message');
        const subwayInfoMessage = document.getElementById('subway-info-message');
        const subwayResults = document.getElementById('subway-results');
        const downloadSubwayIconButton = document.getElementById('downloadSubwayIconButton');
        const clearSubwayInputButton = document.getElementById('clearSubwayInputButton');

        clearSubwayInputButton.addEventListener('click', () => {
            subwayContentInput.value = '';
        });
        processSubwayButton.addEventListener('click', () => {
            subwayErrorMessage.textContent = '';
            subwayInfoMessage.textContent = '';
            subwayResults.innerHTML = '';
            const inputText = subwayContentInput.value.trim();
            if (!inputText) {
                subwayErrorMessage.textContent = '请输入内容！';
                return;
            }
            const lines = inputText.split(/\r?\n/).filter(line => line.trim()!== '');
            const validEntries = [];
            
            lines.forEach(line => {
                const nameMatch = line.match(/^(\d+)\s*--\s*\d+\s*--\s*(.+)$/);
                const numberMatch = line.match(/\d+/);
                
                if (nameMatch) {
                    const name = nameMatch[2].trim();
                    const number = nameMatch[1].trim();
                    validEntries.push({ name, number });
                } else if (numberMatch) {
                    const number = numberMatch[0].trim();
                    validEntries.push({ name: "Null", number });
                }
            });
            
            if (validEntries.length === 0) {
                subwayErrorMessage.textContent = '输入内容无有效条目！';
                return;
            }
            
            validEntries.forEach(entry => {
                const imageUrl = `https://imgcdn.gp.qq.com/images/Subway/s/${entry.number}.png`;
                const resultItem = document.createElement('div');
                resultItem.className ='result-item';
                const title = document.createElement('p');
                title.textContent = `${entry.name} 输出值: ${entry.number}`;
                resultItem.appendChild(title);
                const img = document.createElement('img');
                img.src = imageUrl;
                img.alt = `${entry.name} ${entry.number}`;
                resultItem.appendChild(img);
                subwayResults.appendChild(resultItem);
            });
            
            subwayInfoMessage.textContent = `共处理了 ${validEntries.length} 个输入值。`;
            downloadSubwayIconButton.style.display = 'block';
            
            // 标记有内容生成
            hasContentGenerated = true;
            showBackToBottomButton();
        });
        
        function downloadSubwayIcons() {
            const imgs = document.querySelectorAll('#subway-results img');
            imgs.forEach(img => {
                const a = document.createElement('a');
                a.href = img.src;
                a.download = img.src.split('/').pop();
                a.click();
            });
        }

        // Dump 修正处理
        let processedContent = '';
        const processDumpButton = document.getElementById('processDumpButton');
        const fileInput = document.getElementById('fileInput');
        const originalText = document.getElementById('originalText');
        const processedText = document.getElementById('processedText');
        const downloadDumpButton = document.getElementById('downloadDumpButton');
        const copyDumpButton = document.getElementById('copyDumpButton');

        processDumpButton.addEventListener('click', () => {
            if (!fileInput.files.length) {
                alert("请选择一个TXT文件");
                return;
            }
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = function (event) {
                const lines = event.target.result.split(/\r?\n/);
                originalText.textContent = lines.join("\n");
                const processedLines = lines.map(line => {
                    const parts = line.split('--').map(p => p.trim());
                    if (parts.length >= 3) {
                        return `${parts[0]} -- ${parts[1]} -- ${parts[2]}`;
                    }
                    return '';
                }).filter(line => line!== '');
                processedContent = processedLines.join('\n');
                processedText.textContent = processedContent;
                downloadDumpButton.style.display = "block";
                copyDumpButton.style.display = "block";
                
                // 标记有内容生成
                hasContentGenerated = true;
                showBackToBottomButton();
            };
            reader.readAsText(file);
        });
        downloadDumpButton.addEventListener('click', () => {
            if (!processedContent) {
                alert("没有可下载的内容");
                return;
            }
            const date = new Date();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const fileName = `CG33UE4Dump${month}${day}.txt`;
            const blob = new Blob([processedContent], { type: "text/plain" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
        copyDumpButton.addEventListener('click', () => {
            if (!processedContent) {
                alert("没有可复制的内容");
                return;
            }
            navigator.clipboard.writeText(processedContent).then(() => {
                alert("内容已复制到剪贴板！");
            }).catch(err => {
                console.error("复制失败:", err);
                alert("复制失败，请手动选择文本复制");
            });
        });

        // 文件差异对比
        const compareFilesButton = document.getElementById('compareFilesButton');
        const fileAInput = document.getElementById('fileAInput');
        const fileBInput = document.getElementById('fileBInput');
        const diffPreview = document.getElementById('diffPreview');
        const downloadDiffButton = document.getElementById('downloadDiffButton');
        const copyDiffButton = document.getElementById('copyDiffButton');
        let diffContent = '';

        compareFilesButton.addEventListener('click', () => {
            if (!fileAInput.files.length ||!fileBInput.files.length) {
                alert("请选择两个TXT文件");
                return;
            }
            const fileA = fileAInput.files[0];
            const fileB = fileBInput.files[0];
            const readerA = new FileReader();
            const readerB = new FileReader();
            readerA.onload = function (eventA) {
                const linesA = eventA.target.result.split(/\r?\n/);
                readerB.onload = function (eventB) {
                    const linesB = eventB.target.result.split(/\r?\n/);
                    const diffLines = [];
                    const fileADiffLines = [];
                    linesA.forEach(line => {
                        if (!linesB.includes(line)) {
                            fileADiffLines.push(line);
                        }
                    });
                    if (fileADiffLines.length > 0) {
                        diffLines.push('文件A独有:');
                        diffLines.push(...fileADiffLines);
                    }
                    const fileBDiffLines = [];
                    linesB.forEach(line => {
                        if (!linesA.includes(line)) {
                            fileBDiffLines.push(line);
                        }
                    });
                    if (fileBDiffLines.length > 0) {
                        if (diffLines.length > 0) {
                            diffLines.push('');
                        }
                        diffLines.push('文件B独有:');
                        diffLines.push(...fileBDiffLines);
                    }
                    diffContent = diffLines.join('\n');
                    diffPreview.textContent = diffContent;
                    downloadDiffButton.style.display = 'block';
                    copyDiffButton.style.display = 'block';
                    
                    // 标记有内容生成
                    hasContentGenerated = true;
                    showBackToBottomButton();
                };
                readerB.readAsText(fileB);
            };
            readerA.readAsText(fileA);
        });
        downloadDiffButton.addEventListener('click', () => {
            if (!diffContent) {
                alert("没有可下载的差异内容");
                return;
            }
            const date = new Date();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const dateStr = month + day;
            const fileName = `${dateStr}差异内容补全.txt`;
            const blob = new Blob([diffContent], { type: "text/plain" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
        copyDiffButton.addEventListener('click', () => {
            if (!diffContent) {
                alert("没有可复制的差异内容");
                return;
            }
            navigator.clipboard.writeText(diffContent).then(() => {
                alert("差异内容已复制到剪贴板！");
            }).catch(err => {
                console.error("复制失败:", err);
                alert("复制失败，请手动选择文本复制");
            });
        });
    </script>
</body>
</html>
